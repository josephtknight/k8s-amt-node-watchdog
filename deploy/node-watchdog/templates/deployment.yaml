apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "node-watchdog.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "node-watchdog.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "node-watchdog.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "node-watchdog.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "node-watchdog.fullname" . }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "node-watchdog.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname
        {{- if .Values.preferControlPlaneNodes }}
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
        {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: watchdog
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "node-watchdog.fullname" . }}-config
            - secretRef:
                name: {{ include "node-watchdog.fullname" . }}-amt
          env:
            - name: LEASE_NAME
              value: {{ include "node-watchdog.fullname" . }}
            - name: LEASE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
