apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "node-watchdog.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "node-watchdog.labels" . | nindent 4 }}
data:
  NOT_READY_THRESHOLD: {{ .Values.config.notReadyThreshold | quote }}
  POLL_INTERVAL: {{ .Values.config.pollInterval | quote }}
  COOLDOWN_PERIOD: {{ .Values.config.cooldownPeriod | quote }}
  MAX_CONCURRENT_RESTARTS: {{ .Values.config.maxConcurrentRestarts | quote }}
  AMT_PORT: {{ .Values.amt.port | quote }}
  AMT_ANNOTATION: {{ .Values.amt.annotation | quote }}
  DRY_RUN: {{ .Values.config.dryRun | quote }}
